name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  TF_DIR: terraform

jobs:
  build-and-deploy:
    name: Build and Deploy to ECS Fargate
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run syntax checks
        run: |
          node --check app.js
          node --check routes/auth.js
          node --check routes/notes.js
          node --check middleware/authMiddleware.js
          node -e "require('yamljs').load('./swagger.yaml')"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform format check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Create ECR repository
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_db_host: ${{ secrets.DB_HOST }}
          TF_VAR_db_port: ${{ secrets.DB_PORT }}
          TF_VAR_db_user: ${{ secrets.DB_USER }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_db_name: ${{ secrets.DB_NAME }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
        run: terraform apply -auto-approve -target=aws_ecr_repository.app

      - name: Read ECR repository URL
        id: ecr
        working-directory: ${{ env.TF_DIR }}
        run: echo "repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REPOSITORY_URL: ${{ steps.ecr.outputs.repository_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f dockerfile -t "$ECR_REPOSITORY_URL:$IMAGE_TAG" .
          docker push "$ECR_REPOSITORY_URL:$IMAGE_TAG"

      - name: Deploy infrastructure and ECS service
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_image_uri: ${{ steps.ecr.outputs.repository_url }}:${{ github.sha }}
          TF_VAR_db_host: ${{ secrets.DB_HOST }}
          TF_VAR_db_port: ${{ secrets.DB_PORT }}
          TF_VAR_db_user: ${{ secrets.DB_USER }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_db_name: ${{ secrets.DB_NAME }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
        run: terraform apply -auto-approve
